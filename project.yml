name: MiniCompta
options:
  bundleIdPrefix: ch.yannickmauray
  developmentTeam: WFMP87LTRX
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: fr

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: WFMP87LTRX
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MiniCompta:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources
    dependencies:
      - sdk: SwiftData.framework
      - sdk: Charts.framework
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Mini Compta
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.yannickmauray.mini-compta
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MiniComptaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests
    dependencies:
      - target: MiniCompta
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.yannickmauray.mini-compta.tests
        GENERATE_INFOPLIST_FILE: YES