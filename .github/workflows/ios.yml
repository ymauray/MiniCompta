name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and Test
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | jq -r '[.devices | to_entries[] | select(.key | contains("iOS-18")) | .value[]] | first | .udid')
          xcodebuild \
            -project MiniCompta.xcodeproj \
            -scheme MiniCompta \
            -destination "platform=iOS Simulator,id=$UDID" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test
